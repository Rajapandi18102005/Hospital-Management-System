<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS Portal Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">
                <a href="index.html"><span>➕ Lifeline HMS</span></a>
            </div>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="register.html" class="nav-link">Register</a>
            </nav>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="card auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Login to access your HMS account portal</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register Here</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Lifeline Hospital Management System. All rights reserved.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // If already logged in, redirect
            const user = Auth.getUser();
            if (user) {
                Auth.redirectToDashboard(user.role);
            }

            const loginForm = document.getElementById('login-form');
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();

                try {
                    const data = await apiRequest('/users/login', {
                        method: 'POST',
                        body: JSON.stringify({ username, password })
                    });
                    
                    showToast('Login successful! Welcome back.', 'success');
                    Auth.saveUser(data);
                    Auth.saveCredentials(username, password); // store for HTTP Basic auth

                    // Redirect based on role
                    setTimeout(() => {
                        Auth.redirectToDashboard(data.role);
                    }, 1200);

                } catch (err) {
                    showToast(err.message || 'Login failed. Please verify credentials.', 'error');
                }
            });
        });
    </script>
</body>
</html>
